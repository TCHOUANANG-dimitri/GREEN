<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disease Database — GREEN</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <script>(function(){var t=localStorage.getItem('green_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    /* ---- Search / filter bar -------------------------------- */
    .search-bar {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--sp-4) var(--sp-6);
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-4);
      align-items: center;
      margin-bottom: var(--sp-6);
    }
    .search-input-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }
    .search-input-wrap svg {
      position: absolute;
      left: var(--sp-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 var(--sp-3) 0 calc(var(--sp-3) + 20px + var(--sp-2));
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: var(--text-sm);
      font-family: var(--font-sans);
      outline: none;
      transition: border-color var(--dur-base) var(--ease-out);
    }
    .search-input:focus { border-color: var(--input-border-focus); box-shadow: 0 0 0 3px var(--input-ring); }
    .plant-filters { display: flex; gap: var(--sp-2); flex-wrap: wrap; }
    .plant-chip {
      height: 34px;
      padding: 0 var(--sp-4);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      border: 1.5px solid var(--border-default);
      background: var(--bg-subtle);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--dur-base) var(--ease-out);
    }
    .plant-chip:hover   { border-color: var(--brand-primary); color: var(--brand-primary); }
    .plant-chip.active  { background: var(--brand-primary); border-color: var(--brand-primary); color: #fff; }
    .result-count {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ---- Two-column layout ---------------------------------- */
    .db-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: var(--sp-6);
      align-items: start;
    }
    @media (max-width: 1100px) { .db-layout { grid-template-columns: 1fr; } }

    /* ---- Disease card grid ---------------------------------- */
    .disease-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--sp-4);
    }
    .disease-card {
      background: var(--surface-1);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      cursor: pointer;
      transition: border-color var(--dur-base) var(--ease-out),
                  box-shadow var(--dur-base) var(--ease-out),
                  transform var(--dur-base) var(--ease-out);
    }
    .disease-card:hover {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px var(--brand-glow-lg);
      transform: translateY(-1px);
    }
    .disease-card.selected {
      border-color: var(--brand-primary);
      background: rgba(46,204,113,0.04);
    }
    .dc-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      margin-bottom: var(--sp-3);
    }
    .dc-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .dc-sci {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: var(--sp-3);
    }
    .dc-plants {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .plant-tag {
      font-size: 10px;
      font-weight: var(--weight-semibold);
      padding: 2px 7px;
      border-radius: var(--radius-full);
      background: rgba(46,204,113,0.10);
      color: var(--brand-primary);
      border: 1px solid rgba(46,204,113,0.2);
    }

    /* ---- Detail panel -------------------------------------- */
    .detail-panel {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: sticky;
      top: calc(var(--header-height) + var(--sp-6));
      max-height: calc(100vh - var(--header-height) - var(--sp-12));
      overflow-y: auto;
    }
    .detail-hdr {
      padding: var(--sp-5) var(--sp-6);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-subtle);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .detail-hdr-name {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      margin: 0 0 2px;
    }
    .detail-hdr-sci {
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-style: italic;
    }
    .detail-body { padding: var(--sp-5) var(--sp-6); }
    .detail-section { margin-bottom: var(--sp-5); }
    .detail-section-title {
      font-size: 11px;
      font-weight: var(--weight-semibold);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin: 0 0 var(--sp-2);
    }
    .detail-section ul {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: var(--sp-2);
    }
    .detail-section ul li {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      display: flex; align-items: flex-start; gap: var(--sp-2);
      line-height: 1.5;
    }
    .detail-section ul li::before { content: '•'; color: var(--brand-primary); flex-shrink: 0; margin-top: 2px; }
    .alias-list {
      display: flex; flex-wrap: wrap; gap: var(--sp-2);
    }
    .alias-tag {
      font-size: var(--text-xs);
      padding: 3px 10px;
      border-radius: var(--radius-full);
      background: var(--bg-muted);
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
    }
    .detail-description {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.65;
      margin: 0;
    }

    /* ---- Empty / loading state ----------------------------- */
    .panel-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-16) var(--sp-6);
      text-align: center;
      color: var(--text-muted);
      gap: var(--sp-3);
    }
    .panel-placeholder svg { opacity: .2; }
    .panel-placeholder p { font-size: var(--text-sm); margin: 0; }

    .empty-grid {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--sp-16);
      color: var(--text-muted);
      font-size: var(--text-sm);
    }
  </style>
</head>
<body>
<div class="app-layout" id="appLayout">
  <div class="app-main" id="appMain">
    <main class="app-content" id="appContent">

      <!-- Banner -->
      <div style="background:linear-gradient(135deg,var(--brand-darker) 0%,var(--brand-dark) 60%,var(--brand-mid) 100%);border-radius:var(--radius-xl);padding:var(--sp-8) var(--sp-10);margin-bottom:var(--sp-8);position:relative;overflow:hidden;">
        <div style="position:absolute;width:280px;height:280px;background:rgba(255,255,255,.05);border-radius:50%;right:-50px;top:-80px;pointer-events:none;"></div>
        <div style="position:relative;z-index:1;">
          <div style="font-size:var(--text-xs);color:rgba(255,255,255,.6);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--sp-2);">Analytics</div>
          <div style="font-size:var(--text-2xl);font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.2;margin-bottom:var(--sp-2);">Disease Database</div>
          <div style="font-size:var(--text-sm);color:rgba(255,255,255,.6);">
            Complete agronomic reference — symptoms, causes, and treatment recommendations.
          </div>
        </div>
      </div>

      <!-- Search + filter bar -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="searchInput"
                 placeholder="Search by name, alias, or crop..." oninput="filterDiseases()" />
        </div>
        <div class="plant-filters" id="plantFilters">
          <button class="plant-chip active" data-plant="" onclick="setPlantFilter(this, '')">All crops</button>
          <button class="plant-chip" data-plant="maïs" onclick="setPlantFilter(this, 'maïs')">Maize</button>
          <button class="plant-chip" data-plant="tomate" onclick="setPlantFilter(this, 'tomate')">Tomato</button>
          <button class="plant-chip" data-plant="manioc" onclick="setPlantFilter(this, 'manioc')">Cassava</button>
        </div>
        <span class="result-count" id="resultCount">Loading...</span>
      </div>

      <!-- Two-column layout -->
      <div class="db-layout">

        <!-- Left: disease grid -->
        <div>
          <div class="disease-grid" id="diseaseGrid">
            <div style="grid-column:1/-1;text-align:center;padding:var(--sp-10);color:var(--text-muted);font-size:var(--text-sm);">
              Loading disease database...
            </div>
          </div>
        </div>

        <!-- Right: detail panel -->
        <div class="detail-panel" id="detailPanel">
          <div class="panel-placeholder">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <p>Select a disease to view the complete reference sheet.</p>
          </div>
        </div>

      </div>

    </main>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/layout.js"></script>
<script>
/* ---- State ------------------------------------------------ */
let _allDiseases  = [];
let _activePlant  = '';
let _selectedId   = null;

document.addEventListener('DOMContentLoaded', () => {
  App.boot();
  Layout.init({ page: 'diseases', title: 'Disease Database', subtitle: 'Agronomic reference' });
  loadDiseases();
});

/* ---- Disease icons by id / type --------------------------- */
const ICONS = {
  healthy: {
    svg: `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.82A2 2 0 0 0 6 22c5.13 0 9-4.46 9-10V8"/><path d="M12 22s0-8-7-10"/></svg>`,
    bg: 'rgba(46,204,113,0.12)', color: '#16a34a'
  },
  mildiou: {
    svg: `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`,
    bg: 'rgba(139,92,246,0.12)', color: '#7c3aed'
  },
  oidium: {
    svg: `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>`,
    bg: 'rgba(156,163,175,0.12)', color: '#6b7280'
  },
  rouille: {
    svg: `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
    bg: 'rgba(249,115,22,0.12)', color: '#ea580c'
  },
  anthracnose: {
    svg: `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`,
    bg: 'rgba(239,68,68,0.12)', color: '#dc2626'
  },
  _default: {
    svg: `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`,
    bg: 'rgba(239,68,68,0.10)', color: '#dc2626'
  },
};

function getIcon(id) {
  return ICONS[id] || ICONS._default;
}

/* ---- Load all diseases from API --------------------------- */
async function loadDiseases() {
  const { data, error } = await API.diseases.list();
  if (error || !data) {
    document.getElementById('diseaseGrid').innerHTML =
      '<div class="empty-grid">Unable to load disease database. Check server connectivity.</div>';
    return;
  }
  _allDiseases = data;
  renderGrid();
}

/* ---- Render disease cards --------------------------------- */
function renderGrid() {
  const q     = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const plant = _activePlant.toLowerCase();

  const filtered = _allDiseases.filter(d => {
    if (d.id === 'healthy') return false; // exclude from list
    if (plant) {
      const inPlants = d.affectedPlants?.some(p => p.toLowerCase().includes(plant));
      if (!inPlants) return false;
    }
    if (q) {
      return d.name?.toLowerCase().includes(q)
          || d.scientificName?.toLowerCase().includes(q)
          || d.aliases?.some(a => a.toLowerCase().includes(q))
          || d.affectedPlants?.some(p => p.toLowerCase().includes(q));
    }
    return true;
  });

  document.getElementById('resultCount').textContent =
    `${filtered.length} disease${filtered.length !== 1 ? 's' : ''} found`;

  const grid = document.getElementById('diseaseGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-grid">No diseases match your search.</div>';
    return;
  }

  grid.innerHTML = filtered.map(d => {
    const icon = getIcon(d.id);
    const sel  = d.id === _selectedId ? ' selected' : '';
    const plants = (d.affectedPlants || []).slice(0, 3).map(p =>
      `<span class="plant-tag">${p}</span>`
    ).join('');
    return `
      <div class="disease-card${sel}" onclick="selectDisease('${d.id}')">
        <div class="dc-icon" style="background:${icon.bg};color:${icon.color}">${icon.svg}</div>
        <div class="dc-name">${d.name}</div>
        <div class="dc-sci">${d.scientificName || '—'}</div>
        <div class="dc-plants">${plants}</div>
      </div>`;
  }).join('');
}

/* ---- Filter controls -------------------------------------- */
function filterDiseases() { renderGrid(); }

function setPlantFilter(btn, plant) {
  _activePlant = plant;
  document.querySelectorAll('.plant-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

/* ---- Select and show detail ------------------------------- */
function selectDisease(id) {
  _selectedId = id;
  const disease = _allDiseases.find(d => d.id === id);
  if (!disease) return;

  // Update card selection
  document.querySelectorAll('.disease-card').forEach(c => {
    c.classList.toggle('selected', c.getAttribute('onclick') === `selectDisease('${id}')`);
  });

  renderDetail(disease);
}

function renderDetail(d) {
  const icon = getIcon(d.id);

  const descriptionHtml = d.description
    ? `<div class="detail-section">
         <p class="detail-description">${d.description}</p>
       </div>`
    : '';

  const symptomsHtml = (d.symptoms || []).length
    ? `<div class="detail-section">
         <div class="detail-section-title">Symptoms</div>
         <ul>${(d.symptoms || []).map(s => `<li>${s}</li>`).join('')}</ul>
       </div>`
    : '';

  const actionsHtml = (d.actions || []).length
    ? `<div class="detail-section">
         <div class="detail-section-title">Treatment &amp; Recommendations</div>
         <ul>${(d.actions || []).map(a => `<li>${a}</li>`).join('')}</ul>
       </div>`
    : '';

  const plantsHtml = (d.affectedPlants || []).length
    ? `<div class="detail-section">
         <div class="detail-section-title">Affected Crops</div>
         <div class="alias-list">
           ${d.affectedPlants.map(p => `<span class="plant-tag" style="font-size:var(--text-xs);padding:4px 10px;">${p}</span>`).join('')}
         </div>
       </div>`
    : '';

  const aliasesHtml = (d.aliases || []).length
    ? `<div class="detail-section">
         <div class="detail-section-title">Known as</div>
         <div class="alias-list">
           ${d.aliases.map(a => `<span class="alias-tag">${a}</span>`).join('')}
         </div>
       </div>`
    : '';

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-hdr">
      <div style="display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-2);">
        <div style="width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;background:${icon.bg};color:${icon.color};flex-shrink:0;">${icon.svg}</div>
        <div>
          <div class="detail-hdr-name">${d.name}</div>
          <div class="detail-hdr-sci">${d.scientificName || '—'}</div>
        </div>
      </div>
    </div>
    <div class="detail-body">
      ${descriptionHtml}
      ${plantsHtml}
      ${symptomsHtml}
      ${actionsHtml}
      ${aliasesHtml}
    </div>`;
}
</script>
</body>
</html>
